<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div id="session-banner" class="hidden">
        <span id="session-text"></span>
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </header>

    <main>
      <section id="auth-container">
        <h3>Account Access</h3>
        <div class="auth-grid">
          <form id="login-form">
            <h4>Login</h4>
            <div class="form-group">
              <label for="login-email">Email:</label>
              <input type="email" id="login-email" required placeholder="you@mergington.edu" />
            </div>
            <div class="form-group">
              <label for="login-password">Password:</label>
              <input type="password" id="login-password" required minlength="6" />
            </div>
            <div class="form-group">
              <label for="login-role">Role:</label>
              <select id="login-role" required>
                <option value="student">Student</option>
                <option value="club_admin">Club Admin</option>
                <option value="super_admin">Super Admin</option>
              </select>
            </div>
            <button type="submit">Login</button>
          </form>

          <form id="register-form">
            <h4>Register</h4>
            <div class="form-group">
              <label for="register-email">Email:</label>
              <input type="email" id="register-email" required placeholder="you@mergington.edu" />
            </div>
            <div class="form-group">
              <label for="register-password">Password:</label>
              <input type="password" id="register-password" required minlength="6" />
            </div>
            <div class="form-group">
              <label for="register-role">Role:</label>
              <select id="register-role" required>
                <option value="student">Student</option>
                <option value="club_admin">Club Admin</option>
                <option value="super_admin">Super Admin</option>
              </select>
            </div>
            <button type="submit">Register</button>
          </form>
        </div>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity (Authenticated)</h3>
        <p id="signup-note">You must be logged in to sign up or unregister.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
      </section>

      <div id="message" class="hidden"></div>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
